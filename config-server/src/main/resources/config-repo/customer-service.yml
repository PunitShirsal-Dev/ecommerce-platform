spring:
  datasource:
    url: ${CUSTOMER_DB_URL:jdbc:postgresql://localhost:5432/customers}
    username: ${CUSTOMER_DB_USER:customers}
    password: ${CUSTOMER_DB_PASSWORD:customers}
  flyway:
    enabled: true
  cache:
    type: redis
    redis:
      time-to-live: 600000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
